version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: jab-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_CORS_ALLOWED_ORIGINS=*
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
    user: "node"

  frontend:
    build: .
    container_name: jab-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://jab-api.atlasbot.tech/webhook
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - n8n

volumes:
  n8n_data:
